<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>💧 Water Bottle Tracker</title>
    <style>
        :root {
            --bg: #f0f4f8;
            --card: #ffffff;
            --primary: #2b7de9;
            --primary-dark: #1a5db8;
            --accent: #f59e0b;
            --accent-dark: #d97706;
            --text: #1e293b;
            --text-light: #64748b;
            --text-muted: #94a3b8;
            --danger: #ef4444;
            --success: #10b981;
            --border: #e2e8f0;
            --shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.12);
            --radius: 20px;
            --radius-sm: 12px;
            --radius-xs: 8px;
            --font-xl: clamp(2.2rem, 5vw, 3.5rem);
            --font-lg: clamp(1.4rem, 3vw, 1.8rem);
            --font-md: clamp(1rem, 2.2vw, 1.2rem);
            --font-sm: clamp(0.8rem, 1.8vw, 0.95rem);
            --font-xs: clamp(0.7rem, 1.5vw, 0.8rem);
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --bounce: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            padding-bottom: env(safe-area-inset-bottom, 16px);
        }

        /* ──────────────── NAVBAR ──────────────── */
        .navbar {
            background: var(--card);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
        }
        .navbar-brand {
            font-weight: 700;
            font-size: var(--font-md);
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
            letter-spacing: -0.3px;
        }
        .navbar-brand .icon {
            font-size: 1.5em;
            animation: float 2.5s ease-in-out infinite;
        }
        @keyframes float {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-6px);
            }
        }
        .navbar-actions {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }
        .btn-nav {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 10px 14px;
            border-radius: 50px;
            border: 1.5px solid var(--border);
            background: var(--card);
            cursor: pointer;
            font-size: var(--font-sm);
            font-weight: 600;
            color: var(--text);
            transition: var(--transition);
            white-space: nowrap;
            min-height: 44px;
            letter-spacing: -0.2px;
            position: relative;
            overflow: hidden;
        }
        .btn-nav:active {
            transform: scale(0.94);
            background: #f1f5f9;
        }
        .btn-nav .nav-icon {
            font-size: 1.3em;
            line-height: 1;
        }
        .btn-nav.today-btn {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
            font-weight: 700;
            box-shadow: 0 2px 8px rgba(43, 125, 233, 0.3);
        }
        .btn-nav.today-btn:active {
            background: var(--primary-dark);
        }
        .btn-nav.analytics-btn {
            border-color: #c4b5fd;
            background: #f5f3ff;
            color: #6d28d9;
        }
        .btn-nav.price-btn {
            border-color: #fcd34d;
            background: #fffbeb;
            color: #b45309;
        }

        /* ──────────────── MAIN CONTENT ──────────────── */
        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 12px 14px;
            gap: 14px;
            max-width: 600px;
            width: 100%;
            margin: 0 auto;
        }

        /* Date Display Card */
        .date-card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 18px 20px;
            text-align: center;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            transition: var(--transition);
        }
        .date-label {
            font-size: var(--font-sm);
            color: var(--text-light);
            font-weight: 500;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            margin-bottom: 2px;
        }
        .date-display {
            font-size: var(--font-xl);
            font-weight: 800;
            color: var(--text);
            letter-spacing: -1px;
            line-height: 1.1;
        }
        .date-display .month-year {
            font-weight: 500;
            color: var(--text-light);
            font-size: 0.55em;
            display: block;
            letter-spacing: 0;
        }
        .date-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 50px;
            font-size: var(--font-xs);
            font-weight: 600;
            margin-top: 6px;
            letter-spacing: 0.3px;
        }
        .badge-today {
            background: #dbeafe;
            color: #1d4ed8;
        }
        .badge-past {
            background: #f1f5f9;
            color: #64748b;
        }
        .badge-future {
            background: #fef3c7;
            color: #92400e;
        }

        /* Bottle Counter Card */
        .counter-card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 16px 18px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }
        .counter-card.future-locked {
            opacity: 0.55;
            pointer-events: none;
            filter: grayscale(30%);
        }
        .counter-card.future-locked .counter-row {
            pointer-events: none;
        }
        .counter-label {
            font-size: var(--font-sm);
            color: var(--text-light);
            font-weight: 600;
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }
        .counter-row {
            display: flex;
            align-items: center;
            gap: 20px;
            justify-content: center;
            width: 100%;
        }
        .btn-counter {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            border: 2.5px solid var(--border);
            background: var(--card);
            cursor: pointer;
            font-size: 2rem;
            font-weight: 700;
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--bounce);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            position: relative;
            -webkit-tap-highlight-color: transparent;
            min-width: 64px;
        }
        .btn-counter:active {
            transform: scale(0.85);
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.1);
        }
        .btn-counter.plus {
            background: #ecfdf5;
            border-color: #6ee7b7;
            color: #059669;
        }
        .btn-counter.plus:active {
            background: #d1fae5;
            border-color: #34d399;
        }
        .btn-counter.minus {
            background: #fef2f2;
            border-color: #fca5a5;
            color: #dc2626;
        }
        .btn-counter.minus:active {
            background: #fee2e2;
            border-color: #f87171;
        }
        .bottle-count-wrapper {
            position: relative;
            min-width: 90px;
            text-align: center;
        }
        .bottle-count {
            font-size: 4.5rem;
            font-weight: 900;
            color: var(--text);
            letter-spacing: -2px;
            line-height: 1;
            transition: var(--bounce);
            display: inline-block;
        }
        .bottle-count.pop {
            animation: popBounce 0.45s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popBounce {
            0% {
                transform: scale(1);
            }
            30% {
                transform: scale(1.35);
                color: var(--primary);
            }
            60% {
                transform: scale(0.9);
            }
            100% {
                transform: scale(1);
            }
        }
        .bottle-unit {
            font-size: var(--font-sm);
            color: var(--text-light);
            font-weight: 500;
            display: block;
            margin-top: -4px;
        }
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(43, 125, 233, 0.25);
            transform: scale(0);
            animation: rippleEffect 0.6s ease-out forwards;
            pointer-events: none;
        }
        @keyframes rippleEffect {
            to {
                transform: scale(3.5);
                opacity: 0;
            }
        }
        .locked-message {
            font-size: var(--font-sm);
            color: #b45309;
            font-weight: 600;
            text-align: center;
            padding: 8px 16px;
            background: #fffbeb;
            border-radius: 50px;
            border: 1px solid #fde68a;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 4px;
        }

        /* ──────────────── DATE STRIP ──────────────── */
        .date-strip-container {
            position: relative;
        }
        .date-strip-label {
            font-size: var(--font-xs);
            color: var(--text-light);
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            margin-bottom: 6px;
            padding-left: 4px;
        }
        .date-strip {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 8px 4px 12px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            -ms-overflow-style: none;
            border-radius: var(--radius-sm);
            background: var(--card);
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }
        .date-strip::-webkit-scrollbar {
            display: none;
        }
        .date-strip-item {
            flex: 0 0 auto;
            min-width: 48px;
            height: 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius-xs);
            cursor: pointer;
            transition: var(--transition);
            background: transparent;
            border: 2px solid transparent;
            gap: 2px;
            position: relative;
            font-weight: 500;
            padding: 4px 6px;
        }
        .date-strip-item:active {
            transform: scale(0.92);
        }
        .date-strip-item .day-num {
            font-size: var(--font-md);
            font-weight: 700;
            line-height: 1;
            letter-spacing: -0.5px;
        }
        .date-strip-item .day-name {
            font-size: 0.65rem;
            color: var(--text-muted);
            font-weight: 500;
            letter-spacing: 0.3px;
        }
        .date-strip-item .month-tag {
            font-size: 0.6rem;
            color: var(--text-muted);
            font-weight: 400;
            position: absolute;
            top: 2px;
            right: 6px;
        }
        .date-strip-item.today {
            border-color: var(--primary);
            background: #eff6ff;
            box-shadow: 0 0 0 4px rgba(43, 125, 233, 0.1);
        }
        .date-strip-item.today .day-num {
            color: var(--primary);
        }
        .date-strip-item.selected {
            background: var(--primary);
            border-color: var(--primary);
            box-shadow: 0 4px 12px rgba(43, 125, 233, 0.35);
        }
        .date-strip-item.selected .day-num,
        .date-strip-item.selected .day-name,
        .date-strip-item.selected .month-tag {
            color: #fff;
        }
        .date-strip-item.future-date {
            opacity: 0.5;
        }
        .date-strip-item.has-bottles::after {
            content: '';
            position: absolute;
            bottom: 3px;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent);
            left: 50%;
            transform: translateX(-50%);
        }
        .date-strip-item.selected.has-bottles::after {
            background: #fff;
        }
        .month-divider {
            flex: 0 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 36px;
            font-size: var(--font-xs);
            font-weight: 700;
            color: var(--primary);
            writing-mode: vertical-lr;
            letter-spacing: 1px;
            opacity: 0.6;
        }

        /* ──────────────── FOOTER ──────────────── */
        .footer-card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 16px 20px;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border);
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-top: auto;
        }
        .footer-label {
            font-size: var(--font-xs);
            color: var(--text-light);
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .footer-total {
            font-size: 2.2rem;
            font-weight: 900;
            color: var(--primary);
            letter-spacing: -1px;
            line-height: 1;
        }
        .footer-total .unit {
            font-size: 0.45em;
            font-weight: 500;
            color: var(--text-light);
            letter-spacing: 0;
        }
        .footer-sub {
            font-size: var(--font-xs);
            color: var(--text-muted);
            font-weight: 400;
        }

        /* ──────────────── MODALS ──────────────── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
            z-index: 200;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            animation: fadeIn 0.25s ease;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        .modal-sheet {
            background: var(--card);
            border-radius: 24px 24px 0 0;
            width: 100%;
            max-width: 600px;
            max-height: 85vh;
            max-height: 85dvh;
            overflow-y: auto;
            padding: 20px 18px 28px;
            box-shadow: 0 -8px 40px rgba(0, 0, 0, 0.2);
            animation: slideUp 0.3s cubic-bezier(0.32, 0.72, 0, 1);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        @keyframes slideUp {
            from {
                transform: translateY(100%);
            }
            to {
                transform: translateY(0);
            }
        }
        .modal-handle {
            width: 40px;
            height: 5px;
            border-radius: 10px;
            background: #d1d5db;
            margin: 0 auto 8px;
            flex-shrink: 0;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-title {
            font-size: var(--font-lg);
            font-weight: 800;
            letter-spacing: -0.5px;
        }
        .btn-close {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: #f1f5f9;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            color: var(--text);
        }
        .btn-close:active {
            background: #e2e8f0;
            transform: scale(0.9);
        }

        /* Analytics Tabs */
        .tabs-row {
            display: flex;
            gap: 6px;
            background: #f1f5f9;
            border-radius: 50px;
            padding: 4px;
        }
        .tab-btn {
            flex: 1;
            padding: 10px 16px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: var(--font-sm);
            transition: var(--transition);
            background: transparent;
            color: var(--text-light);
            letter-spacing: -0.2px;
            min-height: 40px;
        }
        .tab-btn.active {
            background: #fff;
            color: var(--text);
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
        }
        .tab-btn:active {
            transform: scale(0.95);
        }

        /* Chart Area */
        .chart-area {
            display: flex;
            align-items: flex-end;
            gap: 3px;
            height: 200px;
            padding: 8px 0;
            border-bottom: 2px solid #e2e8f0;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: thin;
            min-width: 100%;
        }
        .chart-bar-wrapper {
            flex: 1;
            min-width: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            height: 100%;
            justify-content: flex-end;
        }
        .chart-bar {
            width: 100%;
            max-width: 40px;
            border-radius: 8px 8px 4px 4px;
            background: linear-gradient(180deg, #3b82f6 0%, #2563eb 100%);
            transition: height 0.4s cubic-bezier(0.32, 0.72, 0, 1);
            min-height: 3px;
            cursor: pointer;
            position: relative;
        }
        .chart-bar:hover,
        .chart-bar:active {
            background: linear-gradient(180deg, #60a5fa 0%, #3b82f6 100%);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.2);
        }
        .chart-bar.zero {
            background: #e2e8f0;
            min-height: 3px;
        }
        .chart-bar-label {
            font-size: 0.6rem;
            color: var(--text-muted);
            font-weight: 500;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%;
        }
        .chart-bar-value {
            font-size: 0.6rem;
            font-weight: 700;
            color: var(--text);
            text-align: center;
            min-height: 14px;
        }
        .analytics-summary {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .summary-item {
            flex: 1;
            min-width: 80px;
            background: #f8fafc;
            border-radius: var(--radius-sm);
            padding: 12px;
            text-align: center;
            border: 1px solid var(--border);
        }
        .summary-value {
            font-size: 1.6rem;
            font-weight: 900;
            color: var(--text);
            letter-spacing: -1px;
        }
        .summary-label {
            font-size: var(--font-xs);
            color: var(--text-muted);
            font-weight: 500;
        }

        /* Price Modal */
        .price-input-group {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        .price-input {
            flex: 1;
            min-width: 120px;
            padding: 14px 18px;
            border-radius: 50px;
            border: 2px solid var(--border);
            font-size: var(--font-lg);
            font-weight: 700;
            text-align: center;
            letter-spacing: -0.5px;
            background: #f8fafc;
            transition: var(--transition);
            -webkit-user-select: text;
            user-select: text;
        }
        .price-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 6px rgba(43, 125, 233, 0.08);
            background: #fff;
        }
        .currency-symbol {
            font-size: var(--font-lg);
            font-weight: 700;
            color: var(--text-light);
        }
        .price-result {
            text-align: center;
            padding: 16px;
            background: #f0fdf4;
            border-radius: var(--radius-sm);
            border: 1px solid #bbf7d0;
        }
        .price-result-label {
            font-size: var(--font-xs);
            color: #166534;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .price-result-value {
            font-size: 2.5rem;
            font-weight: 900;
            color: #15803d;
            letter-spacing: -1px;
        }
        .btn-save {
            padding: 14px 24px;
            border-radius: 50px;
            border: none;
            background: var(--primary);
            color: #fff;
            font-weight: 700;
            font-size: var(--font-md);
            cursor: pointer;
            transition: var(--transition);
            letter-spacing: -0.3px;
            min-height: 48px;
        }
        .btn-save:active {
            background: var(--primary-dark);
            transform: scale(0.95);
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(120px);
            background: #1e293b;
            color: #fff;
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: 600;
            font-size: var(--font-sm);
            z-index: 300;
            transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
            pointer-events: none;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
            letter-spacing: -0.2px;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        /* Responsive */
        @media (max-width: 380px) {
            .btn-counter {
                width: 54px;
                height: 54px;
                font-size: 1.6rem;
                min-width: 54px;
            }
            .bottle-count {
                font-size: 3.5rem;
            }
            .counter-row {
                gap: 12px;
            }
            .btn-nav {
                padding: 8px 10px;
                font-size: 0.7rem;
                gap: 3px;
            }
            .btn-nav .nav-icon {
                font-size: 1.1em;
            }
            .navbar {
                padding: 8px 10px;
                gap: 4px;
            }
        }
        @media (min-width: 600px) {
            .main-container {
                padding: 20px 24px;
                gap: 18px;
            }
            .btn-counter {
                width: 74px;
                height: 74px;
                font-size: 2.2rem;
                min-width: 74px;
            }
            .bottle-count {
                font-size: 5.5rem;
            }
            .date-strip-item {
                min-width: 54px;
                height: 66px;
            }
        }
    </style>
</head>
<body>

    <!-- ──────────── NAVBAR ──────────── -->
    <nav class="navbar">
        <div class="navbar-brand">
            <span class="icon">💧</span> BottleTrack
        </div>
        <div class="navbar-actions">
            <button class="btn-nav analytics-btn" onclick="openAnalyticsModal()" aria-label="Analytics">
                <span class="nav-icon">📊</span> Stats
            </button>
            <button class="btn-nav price-btn" onclick="openPriceModal()" aria-label="Set Price">
                <span class="nav-icon">💰</span> Price
            </button>
            <button class="btn-nav today-btn" onclick="goToToday()" aria-label="Go to Today">
                <span class="nav-icon">📍</span> Today
            </button>
        </div>
    </nav>

    <!-- ──────────── MAIN CONTAINER ──────────── -->
    <div class="main-container" id="mainContainer">
        <!-- Date Display -->
        <div class="date-card" id="dateCard">
            <div class="date-label">Selected Date</div>
            <div class="date-display" id="dateDisplay"></div>
            <div id="dateBadge"></div>
        </div>

        <!-- Bottle Counter -->
        <div class="counter-card" id="counterCard">
            <div class="counter-label">🫗 Bottles Delivered</div>
            <div class="counter-row">
                <button class="btn-counter minus" id="btnMinus" onclick="changeBottles(-1)" aria-label="Remove bottle">
                    −
                </button>
                <div class="bottle-count-wrapper">
                    <span class="bottle-count" id="bottleCount">0</span>
                    <span class="bottle-unit">bottles</span>
                </div>
                <button class="btn-counter plus" id="btnPlus" onclick="changeBottles(1)" aria-label="Add bottle">
                    +
                </button>
            </div>
            <div id="lockedMessage" style="display:none;"></div>
        </div>

        <!-- Date Strip -->
        <div class="date-strip-container">
            <div class="date-strip-label">📅 Quick Date Select</div>
            <div class="date-strip" id="dateStrip"></div>
        </div>

        <!-- Footer -->
        <div class="footer-card" id="footerCard">
            <div class="footer-label">📦 Total This Month</div>
            <div class="footer-total" id="footerTotal">0 <span class="unit">bottles</span></div>
            <div class="footer-sub" id="footerSub"></div>
        </div>
    </div>

    <!-- ──────────── ANALYTICS MODAL ──────────── -->
    <div class="modal-overlay" id="analyticsModal" style="display:none;">
        <div class="modal-sheet">
            <div class="modal-handle"></div>
            <div class="modal-header">
                <span class="modal-title">📊 Analytics</span>
                <button class="btn-close" onclick="closeAnalyticsModal()">✕</button>
            </div>
            <div class="tabs-row" id="analyticsTabs">
                <button class="tab-btn active" data-period="week" onclick="switchAnalyticsTab('week')">📆 Week</button>
                <button class="tab-btn" data-period="month" onclick="switchAnalyticsTab('month')">🗓 Month</button>
                <button class="tab-btn" data-period="year" onclick="switchAnalyticsTab('year')">📅 Year</button>
            </div>
            <div class="chart-area" id="chartArea"></div>
            <div class="analytics-summary" id="analyticsSummary"></div>
        </div>
    </div>

    <!-- ──────────── PRICE MODAL ──────────── -->
    <div class="modal-overlay" id="priceModal" style="display:none;">
        <div class="modal-sheet">
            <div class="modal-handle"></div>
            <div class="modal-header">
                <span class="modal-title">💰 Bottle Price</span>
                <button class="btn-close" onclick="closePriceModal()">✕</button>
            </div>
            <div class="price-input-group">
                <span class="currency-symbol">₹</span>
                <input type="number" class="price-input" id="priceInput" placeholder="Price per bottle" min="0" step="0.5" inputmode="decimal">
                <span style="font-size:var(--font-sm);color:var(--text-light);">per bottle</span>
            </div>
            <div class="price-result" id="priceResult" style="display:none;">
                <div class="price-result-label">💵 This Month's Total</div>
                <div class="price-result-value" id="priceResultValue">₹0</div>
            </div>
            <button class="btn-save" onclick="savePrice()">💾 Save Price</button>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        (function() {
            // ──────────────── STATE ────────────────
            const STORAGE_KEY_DATA = 'waterBottleTracker_data';
            const STORAGE_KEY_PRICE = 'waterBottleTracker_price';

            let bottleData = {}; // { 'YYYY-MM-DD': number }
            let pricePerBottle = 0;
            let selectedDate = new Date(); // The date currently being viewed/edited
            let realToday = new Date(); // The actual today (doesn't change during session)
            let analyticsPeriod = 'week'; // 'week' | 'month' | 'year'

            // Normalize to midnight for accurate comparison
            function normalizeDate(d) {
                const nd = new Date(d);
                nd.setHours(0, 0, 0, 0);
                return nd;
            }
            realToday = normalizeDate(realToday);
            selectedDate = normalizeDate(selectedDate);

            function dateKey(d) {
                const y = d.getFullYear();
                const m = String(d.getMonth() + 1).padStart(2, '0');
                const day = String(d.getDate()).padStart(2, '0');
                return `${y}-${m}-${day}`;
            }

            function parseKey(key) {
                const [y, m, d] = key.split('-').map(Number);
                return new Date(y, m - 1, d);
            }

            function isFutureDate(d) {
                return d.getTime() > realToday.getTime();
            }

            function isSameDay(d1, d2) {
                return d1.getFullYear() === d2.getFullYear() &&
                    d1.getMonth() === d2.getMonth() &&
                    d1.getDate() === d2.getDate();
            }

            function isSameMonth(d1, d2) {
                return d1.getFullYear() === d2.getFullYear() &&
                    d1.getMonth() === d2.getMonth();
            }

            // ──────────────── LOCAL STORAGE ────────────────
            function loadData() {
                try {
                    const raw = localStorage.getItem(STORAGE_KEY_DATA);
                    if (raw) {
                        bottleData = JSON.parse(raw);
                        // Validate and clean
                        const cleaned = {};
                        Object.keys(bottleData).forEach(k => {
                            const val = bottleData[k];
                            if (typeof val === 'number' && val >= 0 && /^\d{4}-\d{2}-\d{2}$/.test(k)) {
                                cleaned[k] = Math.round(val);
                            }
                        });
                        bottleData = cleaned;
                    } else {
                        bottleData = {};
                    }
                } catch (e) {
                    bottleData = {};
                }
                try {
                    const rawPrice = localStorage.getItem(STORAGE_KEY_PRICE);
                    if (rawPrice !== null) {
                        pricePerBottle = parseFloat(rawPrice);
                        if (isNaN(pricePerBottle) || pricePerBottle < 0) pricePerBottle = 0;
                    }
                } catch (e) {
                    pricePerBottle = 0;
                }
            }

            function saveData() {
                try {
                    localStorage.setItem(STORAGE_KEY_DATA, JSON.stringify(bottleData));
                } catch (e) {
                    showToast('⚠️ Storage full. Please clear some data.');
                }
            }

            function savePriceToStorage() {
                try {
                    localStorage.setItem(STORAGE_KEY_PRICE, String(pricePerBottle));
                } catch (e) {
                    showToast('⚠️ Could not save price.');
                }
            }

            function getBottlesForDate(d) {
                const key = dateKey(d);
                return bottleData[key] || 0;
            }

            function setBottlesForDate(d, count) {
                const key = dateKey(d);
                if (count <= 0) {
                    delete bottleData[key];
                } else {
                    bottleData[key] = Math.max(0, Math.round(count));
                }
                saveData();
            }

            function getTotalForMonth(year, month) {
                // month is 0-indexed
                let total = 0;
                Object.keys(bottleData).forEach(key => {
                    const d = parseKey(key);
                    if (d.getFullYear() === year && d.getMonth() === month) {
                        total += bottleData[key];
                    }
                });
                return total;
            }

            function getTotalForWeek(d) {
                // Get Monday of the week containing date d
                const dayOfWeek = d.getDay(); // 0=Sun, 1=Mon, ...
                const diffToMonday = dayOfWeek === 0 ? -6 : 1 - dayOfWeek;
                const monday = new Date(d);
                monday.setDate(d.getDate() + diffToMonday);
                monday.setHours(0, 0, 0, 0);
                let total = 0;
                for (let i = 0; i < 7; i++) {
                    const day = new Date(monday);
                    day.setDate(monday.getDate() + i);
                    total += getBottlesForDate(day);
                }
                return total;
            }

            function getTotalForYear(year) {
                let total = 0;
                Object.keys(bottleData).forEach(key => {
                    const d = parseKey(key);
                    if (d.getFullYear() === year) {
                        total += bottleData[key];
                    }
                });
                return total;
            }

            // ──────────────── UI UPDATES ────────────────
            function updateDateDisplay() {
                const display = document.getElementById('dateDisplay');
                const badge = document.getElementById('dateBadge');
                const options = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
                display.innerHTML = selectedDate.toLocaleDateString('en-US', {
                    day: 'numeric',
                    month: 'long',
                    year: 'numeric'
                }) + `<span class="month-year">${selectedDate.toLocaleDateString('en-US', { weekday: 'long' })}</span>`;

                badge.innerHTML = '';
                if (isSameDay(selectedDate, realToday)) {
                    badge.innerHTML = '<span class="date-badge badge-today">📍 Today</span>';
                } else if (isFutureDate(selectedDate)) {
                    badge.innerHTML = '<span class="date-badge badge-future">🔮 Future Date</span>';
                } else {
                    badge.innerHTML = '<span class="date-badge badge-past">📋 Past Date</span>';
                }
            }

            function updateBottleCounter() {
                const count = getBottlesForDate(selectedDate);
                const countEl = document.getElementById('bottleCount');
                const counterCard = document.getElementById('counterCard');
                const lockedMsg = document.getElementById('lockedMessage');
                const btnPlus = document.getElementById('btnPlus');
                const btnMinus = document.getElementById('btnMinus');

                countEl.textContent = count;

                if (isFutureDate(selectedDate)) {
                    counterCard.classList.add('future-locked');
                    lockedMsg.style.display = 'flex';
                    lockedMsg.innerHTML = '🔒 <span>Wait for this date to arrive before adding bottles</span>';
                    btnPlus.style.pointerEvents = 'none';
                    btnMinus.style.pointerEvents = 'none';
                } else {
                    counterCard.classList.remove('future-locked');
                    lockedMsg.style.display = 'none';
                    btnPlus.style.pointerEvents = 'auto';
                    btnMinus.style.pointerEvents = 'auto';
                }
            }

            function updateFooter() {
                const monthTotal = getTotalForMonth(selectedDate.getFullYear(), selectedDate.getMonth());
                const footerTotal = document.getElementById('footerTotal');
                const footerSub = document.getElementById('footerSub');
                const monthName = selectedDate.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });

                footerTotal.innerHTML = `${monthTotal} <span class="unit">bottles</span>`;
                if (pricePerBottle > 0) {
                    const cost = monthTotal * pricePerBottle;
                    footerSub.textContent = `≈ ₹${cost.toFixed(2)} this month (₹${pricePerBottle.toFixed(2)}/bottle)`;
                } else {
                    footerSub.textContent = `${monthName} · Set price in 💰 Price to see cost`;
                }
            }

            function updateDateStrip() {
                const strip = document.getElementById('dateStrip');
                strip.innerHTML = '';

                // Show from 2 months before to 2 months after
                const startDate = new Date(realToday);
                startDate.setMonth(startDate.getMonth() - 2);
                startDate.setDate(1);
                const endDate = new Date(realToday);
                endDate.setMonth(endDate.getMonth() + 2);
                endDate.setDate(new Date(endDate.getFullYear(), endDate.getMonth() + 1, 0).getDate()); // last day

                let lastMonth = -1;
                const dayNames = ['Su', 'Mo', 'Tu', 'We', 'Th', 'Fr', 'Sa'];

                const totalDays = Math.ceil((endDate - startDate) / (1000 * 60 * 60 * 24)) + 1;

                for (let i = 0; i < totalDays; i++) {
                    const d = new Date(startDate);
                    d.setDate(startDate.getDate() + i);
                    if (d > endDate) break;

                    const month = d.getMonth();
                    const monthShort = d.toLocaleDateString('en-US', { month: 'short' });

                    // Add month divider if month changed
                    if (month !== lastMonth && i > 0) {
                        const divider = document.createElement('div');
                        divider.className = 'month-divider';
                        divider.textContent = monthShort.toUpperCase();
                        strip.appendChild(divider);
                    }
                    lastMonth = month;

                    const item = document.createElement('div');
                    item.className = 'date-strip-item';
                    item.innerHTML = `
                        <span class="day-num">${d.getDate()}</span>
                        <span class="day-name">${dayNames[d.getDay()]}</span>
                    `;
                    if (d.getDate() === 1) {
                        const tag = document.createElement('span');
                        tag.className = 'month-tag';
                        tag.textContent = monthShort;
                        item.appendChild(tag);
                    }
                    if (isSameDay(d, realToday)) item.classList.add('today');
                    if (isSameDay(d, selectedDate)) item.classList.add('selected');
                    if (isFutureDate(d)) item.classList.add('future-date');
                    if (getBottlesForDate(d) > 0) item.classList.add('has-bottles');

                    item.addEventListener('click', () => {
                        selectDate(d);
                    });

                    strip.appendChild(item);
                }

                // Scroll to selected date
                requestAnimationFrame(() => {
                    const selectedEl = strip.querySelector('.selected');
                    if (selectedEl) {
                        selectedEl.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                    }
                });
            }

            function selectDate(d) {
                selectedDate = normalizeDate(d);
                refreshAllUI();
            }

            function refreshAllUI() {
                updateDateDisplay();
                updateBottleCounter();
                updateFooter();
                updateDateStrip();
            }

            function changeBottles(delta) {
                if (isFutureDate(selectedDate)) {
                    showToast('🔒 Cannot modify future dates');
                    return;
                }
                const current = getBottlesForDate(selectedDate);
                const newCount = Math.max(0, current + delta);
                setBottlesForDate(selectedDate, newCount);
                updateBottleCounter();
                updateFooter();
                updateDateStrip();

                // Pop animation
                const countEl = document.getElementById('bottleCount');
                countEl.classList.remove('pop');
                void countEl.offsetWidth;
                countEl.classList.add('pop');

                if (delta > 0 && newCount > 0) {
                    showToast(`✅ +${delta} bottle${delta > 1 ? 's' : ''} added!`);
                } else if (delta < 0) {
                    showToast(`🗑️ Removed ${Math.abs(delta)} bottle${Math.abs(delta) > 1 ? 's' : ''}`);
                }
            }

            function goToToday() {
                selectedDate = normalizeDate(new Date());
                realToday = normalizeDate(new Date());
                refreshAllUI();
                // Scroll date strip to today
                requestAnimationFrame(() => {
                    const todayEl = document.querySelector('.date-strip-item.today');
                    if (todayEl) {
                        todayEl.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                    }
                });
                showToast('📍 Back to today!');
            }

            // ──────────────── TOAST ────────────────
            let toastTimeout;

            function showToast(msg) {
                const toast = document.getElementById('toast');
                toast.textContent = msg;
                toast.classList.add('show');
                clearTimeout(toastTimeout);
                toastTimeout = setTimeout(() => {
                    toast.classList.remove('show');
                }, 1800);
            }

            // ──────────────── ANALYTICS MODAL ────────────────
            function openAnalyticsModal() {
                document.getElementById('analyticsModal').style.display = 'flex';
                analyticsPeriod = 'week';
                document.querySelectorAll('#analyticsTabs .tab-btn').forEach(b => b.classList.remove(
                    'active'));
                document.querySelector('#analyticsTabs .tab-btn[data-period="week"]').classList.add('active');
                renderAnalyticsChart();
            }

            function closeAnalyticsModal() {
                document.getElementById('analyticsModal').style.display = 'none';
            }

            function switchAnalyticsTab(period) {
                analyticsPeriod = period;
                document.querySelectorAll('#analyticsTabs .tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelector(`#analyticsTabs .tab-btn[data-period="${period}"]`).classList.add('active');
                renderAnalyticsChart();
            }

            function renderAnalyticsChart() {
                const chartArea = document.getElementById('chartArea');
                const summaryArea = document.getElementById('analyticsSummary');
                chartArea.innerHTML = '';
                summaryArea.innerHTML = '';

                let dataPoints = []; // { label, value, dateKey }
                let totalVal = 0;
                let maxVal = 0;
                let periodLabel = '';

                if (analyticsPeriod === 'week') {
                    // Monday to Sunday of the week containing selectedDate
                    const dayOfWeek = selectedDate.getDay();
                    const diffToMonday = dayOfWeek === 0 ? -6 : 1 - dayOfWeek;
                    const monday = new Date(selectedDate);
                    monday.setDate(selectedDate.getDate() + diffToMonday);
                    monday.setHours(0, 0, 0, 0);
                    const dayNamesFull = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
                    for (let i = 0; i < 7; i++) {
                        const d = new Date(monday);
                        d.setDate(monday.getDate() + i);
                        const val = getBottlesForDate(d);
                        dataPoints.push({
                            label: dayNamesFull[d.getDay()],
                            value: val,
                            dateKey: dateKey(d),
                            date: d
                        });
                        totalVal += val;
                        if (val > maxVal) maxVal = val;
                    }
                    periodLabel = `Week of ${monday.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}`;
                } else if (analyticsPeriod === 'month') {
                    const year = selectedDate.getFullYear();
                    const month = selectedDate.getMonth();
                    const daysInMonth = new Date(year, month + 1, 0).getDate();
                    for (let i = 1; i <= daysInMonth; i++) {
                        const d = new Date(year, month, i);
                        const val = getBottlesForDate(d);
                        dataPoints.push({
                            label: String(i),
                            value: val,
                            dateKey: dateKey(d),
                            date: d
                        });
                        totalVal += val;
                        if (val > maxVal) maxVal = val;
                    }
                    periodLabel = selectedDate.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
                } else if (analyticsPeriod === 'year') {
                    const year = selectedDate.getFullYear();
                    const monthNames = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov',
                        'Dec'
                    ];
                    for (let m = 0; m < 12; m++) {
                        const monthTotal = getTotalForMonth(year, m);
                        dataPoints.push({
                            label: monthNames[m],
                            value: monthTotal,
                            dateKey: `${year}-${String(m+1).padStart(2,'0')}`,
                            date: new Date(year, m, 1)
                        });
                        totalVal += monthTotal;
                        if (monthTotal > maxVal) maxVal = monthTotal;
                    }
                    periodLabel = `Year ${selectedDate.getFullYear()}`;
                }

                // Render bars
                const effectiveMax = Math.max(maxVal, 1);
                dataPoints.forEach(dp => {
                    const wrapper = document.createElement('div');
                    wrapper.className = 'chart-bar-wrapper';

                    const valueLabel = document.createElement('div');
                    valueLabel.className = 'chart-bar-value';
                    valueLabel.textContent = dp.value > 0 ? dp.value : '';

                    const bar = document.createElement('div');
                    bar.className = 'chart-bar';
                    if (dp.value === 0) bar.classList.add('zero');
                    const heightPercent = Math.max((dp.value / effectiveMax) * 100, 2);
                    bar.style.height = heightPercent + '%';
                    bar.title = `${dp.label}: ${dp.value} bottles`;
                    if (dp.value > 0) {
                        bar.setAttribute('data-value', dp.value);
                    }

                    const label = document.createElement('div');
                    label.className = 'chart-bar-label';
                    label.textContent = dp.label;

                    wrapper.appendChild(valueLabel);
                    wrapper.appendChild(bar);
                    wrapper.appendChild(label);
                    chartArea.appendChild(wrapper);
                });

                // Summary
                const avg = dataPoints.length > 0 ? (totalVal / dataPoints.length) : 0;
                const nonZeroDays = dataPoints.filter(dp => dp.value > 0).length;

                summaryArea.innerHTML = `
                    <div class="summary-item">
                        <div class="summary-value">${totalVal}</div>
                        <div class="summary-label">Total Bottles</div>
                    </div>
                    <div class="summary-item">
                        <div class="summary-value">${avg.toFixed(1)}</div>
                        <div class="summary-label">Avg / Period</div>
                    </div>
                    <div class="summary-item">
                        <div class="summary-value">${nonZeroDays}</div>
                        <div class="summary-label">Active Days</div>
                    </div>
                    <div class="summary-item">
                        <div class="summary-value">${maxVal}</div>
                        <div class="summary-label">Peak Day</div>
                    </div>
                `;
                if (pricePerBottle > 0) {
                    summaryArea.innerHTML += `
                        <div class="summary-item" style="background:#fffbeb;border-color:#fcd34d;">
                            <div class="summary-value" style="color:#b45309;">₹${(totalVal * pricePerBottle).toFixed(2)}</div>
                            <div class="summary-label">Total Cost</div>
                        </div>
                    `;
                }
                summaryArea.innerHTML += `
                    <div class="summary-item" style="min-width:100%;background:transparent;border:none;padding:4px;">
                        <div class="summary-label">📋 ${periodLabel}</div>
                    </div>
                `;
            }

            // ──────────────── PRICE MODAL ────────────────
            function openPriceModal() {
                document.getElementById('priceModal').style.display = 'flex';
                document.getElementById('priceInput').value = pricePerBottle > 0 ? pricePerBottle : '';
                updatePriceResult();
                document.getElementById('priceInput').focus();
            }

            function closePriceModal() {
                document.getElementById('priceModal').style.display = 'none';
            }

            function updatePriceResult() {
                const inputVal = parseFloat(document.getElementById('priceInput').value);
                const currentPrice = (!isNaN(inputVal) && inputVal >= 0) ? inputVal : pricePerBottle;
                const monthTotal = getTotalForMonth(realToday.getFullYear(), realToday.getMonth());
                const resultDiv = document.getElementById('priceResult');
                const resultValue = document.getElementById('priceResultValue');

                if (currentPrice > 0) {
                    resultDiv.style.display = 'block';
                    resultValue.textContent = `₹${(monthTotal * currentPrice).toFixed(2)}`;
                } else {
                    resultDiv.style.display = 'none';
                }
            }

            function savePrice() {
                const inputVal = parseFloat(document.getElementById('priceInput').value);
                if (isNaN(inputVal) || inputVal < 0) {
                    pricePerBottle = 0;
                } else {
                    pricePerBottle = inputVal;
                }
                savePriceToStorage();
                updatePriceResult();
                updateFooter();
                showToast('💰 Price saved! ₹' + pricePerBottle.toFixed(2) + '/bottle');
                // Update result display
                const monthTotal = getTotalForMonth(realToday.getFullYear(), realToday.getMonth());
                const resultDiv = document.getElementById('priceResult');
                const resultValue = document.getElementById('priceResultValue');
                if (pricePerBottle > 0) {
                    resultDiv.style.display = 'block';
                    resultValue.textContent = `₹${(monthTotal * pricePerBottle).toFixed(2)}`;
                } else {
                    resultDiv.style.display = 'none';
                }
            }

            // Listen for price input changes
            document.addEventListener('DOMContentLoaded', () => {
                const priceInput = document.getElementById('priceInput');
                if (priceInput) {
                    priceInput.addEventListener('input', updatePriceResult);
                }
            });

            // ──────────────── MODAL CLICK OUTSIDE ────────────────
            document.addEventListener('click', function(e) {
                if (e.target.id === 'analyticsModal') {
                    closeAnalyticsModal();
                }
                if (e.target.id === 'priceModal') {
                    closePriceModal();
                }
            });

            // ──────────────── KEYBOARD SHORTCUTS ────────────────
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    closeAnalyticsModal();
                    closePriceModal();
                }
                if (e.key === 'ArrowRight' && !document.getElementById('analyticsModal').style.display
                    .includes('flex') && !document.getElementById('priceModal').style.display.includes('flex')) {
                    // Navigate to next day
                    const next = new Date(selectedDate);
                    next.setDate(next.getDate() + 1);
                    selectDate(next);
                }
                if (e.key === 'ArrowLeft' && !document.getElementById('analyticsModal').style.display.includes(
                        'flex') && !document.getElementById('priceModal').style.display.includes('flex')) {
                    const prev = new Date(selectedDate);
                    prev.setDate(prev.getDate() - 1);
                    selectDate(prev);
                }
                if (e.key === '+' || e.key === '=') {
                    e.preventDefault();
                    changeBottles(1);
                }
                if (e.key === '-') {
                    e.preventDefault();
                    changeBottles(-1);
                }
                if (e.key === 't' && e.ctrlKey) {
                    e.preventDefault();
                    goToToday();
                }
            });

            // ──────────────── INIT ────────────────
            function init() {
                loadData();
                selectedDate = normalizeDate(new Date());
                realToday = normalizeDate(new Date());
                refreshAllUI();

                // Scroll date strip to today after render
                setTimeout(() => {
                    const todayEl = document.querySelector('.date-strip-item.today');
                    if (todayEl) {
                        todayEl.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                    }
                }, 300);

                // Update realToday every minute (in case the day changes while app is open)
                setInterval(() => {
                    const newToday = normalizeDate(new Date());
                    if (!isSameDay(newToday, realToday)) {
                        realToday = newToday;
                        refreshAllUI();
                        requestAnimationFrame(() => {
                            const todayEl = document.querySelector('.date-strip-item.today');
                            if (todayEl) {
                                todayEl.scrollIntoView({ behavior: 'smooth', block: 'nearest',
                                    inline: 'center' });
                            }
                        });
                    }
                }, 60000);

                console.log('💧 Water Bottle Tracker Ready!');
                console.log('📅 Today:', dateKey(realToday));
                console.log('📦 Total bottles tracked:', Object.values(bottleData).reduce((a, b) => a + b, 0));
            }

            // ──────────────── SERVICE WORKER REGISTRATION (PWA-like) ────────────────
            // Not a full PWA, but we can add a basic cache hint
            if ('caches' in window) {
                // The app is fully client-side, no service worker needed for core functionality
                // All data is in localStorage which persists automatically
            }

            // Start the app
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }

            // ──────────────── EXPOSE FOR HTML ONCLICK ────────────────
            window.changeBottles = changeBottles;
            window.goToToday = goToToday;
            window.openAnalyticsModal = openAnalyticsModal;
            window.closeAnalyticsModal = closeAnalyticsModal;
            window.switchAnalyticsTab = switchAnalyticsTab;
            window.openPriceModal = openPriceModal;
            window.closePriceModal = closePriceModal;
            window.savePrice = savePrice;
        })();
    </script>
</body>
</html>
